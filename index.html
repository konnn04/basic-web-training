<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MPClublub Web Training</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      color: #fff;
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.85);
      font-size: 1.1rem;
      margin-bottom: 3rem;
    }

    .links {
      display: flex;
      gap: 2rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem 3rem;
      text-decoration: none;
      color: #333;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      transition: transform 0.25s, box-shadow 0.25s;
      min-width: 240px;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.3);
    }

    .card-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .card-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .card-desc {
      color: #777;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 MPClublub Web Training</h1>
    <p class="subtitle">Chọn một trang để tiếp tục</p>

    <div class="links">
      <a href="./exam/index.html" class="card">
        <div class="card-icon">📝</div>
        <div class="card-title">Exam</div>
        <div class="card-desc">Trang bài kiểm tra</div>
      </a>

      <a href="./example-layout/index.html" class="card">
        <div class="card-icon">🎨</div>
        <div class="card-title">Example Layout</div>
        <div class="card-desc">Trang layout mẫu</div>
      </a>
    </div>
  </div>

</html>
