<!DOCTYPE html>
<html lang="vi">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Đăng nhập</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="../assets/style.css" rel="stylesheet">
</head>
<body>
<div class="layout-label"><i class="bi bi-lock"></i> Đăng Nhập</div><button class="btn-theme-toggle" id="themeToggle"><i class="bi bi-moon-fill"></i></button>
<div class="prototype-area">
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom" data-prototype="Header"><div class="container"><a class="navbar-brand fw-bold" href="home.html"><i class="bi bi-cart3"></i> ShopOnline</a></div></nav>
<div class="container py-5"><div class="row justify-content-center"><div class="col-lg-9">
<div class="row g-0 shadow-sm rounded-3 overflow-hidden" data-prototype="Auth Layout (2 cột)" data-term="Split layout" data-desc="Layout đăng nhập 2 cột: trái brand (d-none d-md-flex), phải form. Responsive.">
<div class="col-md-5 bg-dark text-light d-flex align-items-center p-4 d-none d-md-flex" data-prototype="Brand Column"><div><h3 data-prototype="Headline">Chào mừng!</h3><p class="opacity-75 small">Đăng nhập để theo dõi đơn hàng.</p><div class="prototype-image mt-3 d-flex align-items-center justify-content-center" style="height:140px;background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3)"><i class="bi bi-shield-check" style="font-size:3rem"></i></div></div></div>
<div class="col-md-7 bg-white p-4" data-prototype="Form Column"><h5><i class="bi bi-box-arrow-in-right"></i> Đăng nhập</h5>
<div class="mb-3" data-prototype="Email Field"><label class="form-label small">Email</label><div class="input-group"><span class="input-group-text"><i class="bi bi-envelope"></i></span><input type="email" class="form-control" placeholder="email@example.com"></div></div>
<div class="mb-3" data-prototype="Password Field"><label class="form-label small">Mật khẩu</label><div class="input-group"><span class="input-group-text"><i class="bi bi-lock"></i></span><input type="password" class="form-control" placeholder="••••••"></div></div>
<div class="d-flex justify-content-between mb-3"><div class="form-check" data-prototype="Remember Me"><input class="form-check-input" type="checkbox"><label class="form-check-label small">Ghi nhớ</label></div><a href="#" class="small">Quên mật khẩu?</a></div>
<button class="btn btn-dark w-100 mb-3" data-prototype="Submit Button">Đăng nhập</button>
<div class="text-center mb-3" data-prototype="Social Login"><small class="text-muted">Hoặc</small><div class="d-flex gap-2 mt-2 justify-content-center"><button class="btn btn-outline-secondary btn-sm"><i class="bi bi-google"></i> Google</button><button class="btn btn-outline-secondary btn-sm"><i class="bi bi-facebook"></i> Facebook</button></div></div>
<div class="text-center small">Chưa có tài khoản? <a href="login.html">Đăng ký</a></div>
</div></div></div></div></div>
<footer class="bg-dark text-light py-3" data-prototype="Footer"><div class="container text-center small text-secondary">© 2026 ShopOnline</div></footer>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="../assets/app.js"></script>
</body>
</html>
